<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #0ea5e9; }
      .water { fill: #0284c7; }
      .dam { fill: white; }
      .waves { fill: #7dd3fc; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #0c4a6e; }
      .water { fill: #075985; }
      .dam { fill: #e0f2fe; }
      .waves { fill: #38bdf8; }
    }
  </style>
  
  <!-- Background circle -->
  <circle class="background" cx="90" cy="90" r="90"/>
  
  <!-- Water waves -->
  <path class="waves" d="M20 120 Q40 110, 60 120 T100 120 Q120 110, 140 120 T180 120 L180 180 L20 180 Z"/>
  <path class="waves" d="M20 130 Q40 120, 60 130 T100 130 Q120 120, 140 130 T180 130 L180 180 L20 180 Z"/>
  
  <!-- Dam structure -->
  <rect class="dam" x="65" y="70" width="50" height="60" rx="2"/>
  
  <!-- Dam details -->
  <rect class="water" x="70" y="100" width="8" height="25"/>
  <rect class="water" x="82" y="95" width="8" height="30"/>
  <rect class="water" x="94" y="105" width="8" height="20"/>
  <rect class="water" x="106" y="90" width="8" height="35"/>
  
  <!-- Water level indicator -->
  <rect class="waves" x="65" y="85" width="50" height="3"/>
  
  <!-- Dam top -->
  <rect class="dam" x="60" y="65" width="60" height="8" rx="2"/>
  
  <!-- Support beams -->
  <rect class="dam" x="63" y="75" width="3" height="50"/>
  <rect class="dam" x="114" y="75" width="3" height="50"/>
</svg>